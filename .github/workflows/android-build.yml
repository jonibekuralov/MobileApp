name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git python3-dev
        sudo apt install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev
        sudo apt install -y libsdl2-ttf-dev libportmidi-dev
        sudo apt install -y libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
        sudo apt install -y default-jdk autoconf libtool pkg-config
        sudo apt install -y zip unzip
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer kivy kivymd pillow
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25b
    
    - name: Configure buildozer
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        echo "Buildozer spec already exists, skipping init"
    
    - name: Build APK
      run: |
        echo "Starting APK build..."
        buildozer android debug
        echo "Build completed. Checking for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \;
        mkdir -p bin
        find . -name "*.apk" -type f -exec cp {} bin/ \;
        ls -la bin/ || echo "No bin directory found"
      continue-on-error: true
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: |
          bin/*.apk
          *.apk
        if-no-files-found: warn
      continue-on-error: true
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        name: Smart Calculator Android APK
        tag_name: v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
