name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install kivy-ios
        brew install autoconf automake libtool pkg-config
        brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf
        brew install portmidi
        brew install ffmpeg
    
    - name: Build kivy-ios
      run: |
        git clone https://github.com/kivy/kivy-ios.git
        cd kivy-ios
        ./toolchain.py build python3 kivy
        ./toolchain.py create ../main.py org.uzbekdev.smartcalculator
      continue-on-error: true
    
    - name: Create Xcode Project
      run: |
        cd kivy-ios
        ./toolchain.py xcode org.uzbekdev.smartcalculator
      continue-on-error: true
    
    - name: Upload iOS Project
      uses: actions/upload-artifact@v3
      with:
        name: ios-project
        path: kivy-ios/dist/*.zip
      continue-on-error: true
    
    - name: Build IPA (if possible)
      run: |
        cd kivy-ios/dist/org.uzbekdev.smartcalculator
        xcodebuild -project org.uzbekdev.smartcalculator.xcodeproj -scheme org.uzbekdev.smartcalculator -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 14' build
      continue-on-error: true
